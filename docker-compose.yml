version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: cwa_postgres
    environment:
      POSTGRES_USER: cwa_user
      POSTGRES_PASSWORD: cwa_password
      POSTGRES_DB: cwa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cwa_user -d cwa_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4
    container_name: cwa_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stgabriel.org
      PGADMIN_DEFAULT_PASSWORD: pgadmin_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
